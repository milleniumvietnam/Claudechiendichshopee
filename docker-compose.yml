version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: kinh-doanh-shopee-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-kinh_doanh_shopee}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kinh-doanh-shopee-api
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-kinh_doanh_shopee}
      FRONTEND_URL: http://localhost:3000

      # Shopee API (add your credentials)
      SHOPEE_KEY: ${SHOPEE_KEY}
      SHOPEE_SECRET: ${SHOPEE_SECRET}
      SHOPEE_PARTNER_ID: ${SHOPEE_PARTNER_ID}
      SHOPEE_SHOP_ID: ${SHOPEE_SHOP_ID}

      # SePay (add your credentials)
      SEPAY_API_KEY: ${SEPAY_API_KEY}
      SEPAY_SECRET_KEY: ${SEPAY_SECRET_KEY}
      SEPAY_MERCHANT_ID: ${SEPAY_MERCHANT_ID}

      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}

      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - kinh-doanh-shopee

  # Frontend (Next.js)
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kinh-doanh-shopee-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_APP_NAME: Kinh Doanh Shopee
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - kinh-doanh-shopee

volumes:
  postgres_data:

networks:
  kinh-doanh-shopee:
    driver: bridge
